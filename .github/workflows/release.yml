name: Build & Release

on:
  push:
    tags:
      - 'v*'        # 推送 v1.0.0 这样的 tag 时触发
  workflow_dispatch:  # 也可以手动触发

permissions:
  contents: write    # 需要写权限来创建 Release

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd apps/macos-shell
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer & electron
        run: pnpm --filter @openclaw-habitat/macos-shell build

      - name: Install Certificate
        env:
          MAC_CERTIFICATE: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          echo "$MAC_CERTIFICATE" | base64 --decode > cert.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import cert.p12 -k build.keychain -P "$MAC_CERTIFICATE_PASSWORD" -T /usr/bin/codesign

          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Keychain debug
        run: |
          echo "=== Keychain list ==="
          security list-keychains
          echo "=== Show keychain info ==="
          security show-keychain-info build.keychain
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning build.keychain

      - name: Package macOS
        # run: pnpm --filter @openclaw-habitat/macos-shell exec electron-builder --mac --publish never
        # 加入 Apple Developer Program ($99/年) 后，取消注释以下 env 块启用签名 + 公证：
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEBUG: electron-builder
        run: |
          pnpm --filter @openclaw-habitat/macos-shell exec electron-builder --mac --publish never --cdebug

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            apps/macos-shell/release/*.dmg
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd apps/macos-shell
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer & electron
        run: pnpm --filter @openclaw-habitat/macos-shell build

      - name: Package Windows
        run: pnpm --filter @openclaw-habitat/macos-shell exec electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            apps/macos-shell/release/*.exe
          if-no-files-found: error

  publish-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
